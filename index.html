<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Anchoress</title>
  <meta name="description" content="Something is coming. Sign up to be the first to know." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': '#a33e00',
            'primary-container': '#ff6600',
            'on-primary': '#ffffff',
            'surface': '#fbf9f4',
            'surface-container-low': '#f3efe8',
            'on-surface': '#1b1c19',
            'on-surface-variant': '#5a4136',
          },
          fontFamily: {
            'headline': ['Cinzel', 'serif'],
            'body': ['Newsreader', 'serif'],
          },
          borderRadius: {
            DEFAULT: '0px',
            'none': '0px',
            'sm': '0px',
            'md': '0px',
            'lg': '0px',
            'xl': '0px',
            '2xl': '0px',
            'full': '0px',
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Newsreader', serif; }
  </style>
</head>

<body class="bg-on-surface text-surface min-h-screen flex flex-col items-center justify-center px-6 text-center">

  <div class="max-w-lg w-full py-24">

    <!-- Logo / Name -->
    <p class="font-headline text-xs tracking-[0.3em] uppercase text-primary-container mb-16">The Anchoress</p>

    <!-- Teaser line -->
    <h1 class="font-headline text-4xl sm:text-5xl uppercase leading-none tracking-tight mb-8">
      Something<br>is coming.
    </h1>

    <p class="font-body italic text-on-surface-variant text-lg mb-16">
      Be the first to know.
    </p>

    <!-- CTA -->
    <a href="https://theanchoress.substack.com/"
       target="_blank"
       rel="noopener noreferrer"
       class="inline-block bg-primary-container text-on-surface font-headline text-sm tracking-widest uppercase px-10 py-4 hover:bg-primary hover:text-surface transition-colors duration-150">
      Sign Up
    </a>

  </div>

  <!-- Footer -->
  <p class="font-headline text-xs tracking-widest uppercase text-on-surface-variant absolute bottom-8">
    © 2026 The Anchoress
  </p>

</body>
</html>
